name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dependencies (CPU, default groups only)
        run: uv sync --frozen
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Type-check
        run: uv run mypy
      - name: Test
        run: uv run pytest

  train-smoke:
    # Separate job: installs the GPU training stack (CPU wheels here) and runs
    # the training-wiring smoke tests. Keeps the main `checks` job lean.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install training group (CPU torch)
        run: uv sync --frozen --group train
      - name: Smoke-test training scripts
        run: uv run pytest -m smoke --no-cov
